# tests/mock-fs/scenarios/harness.toml -- CI fixture only.
#
# Points the harness at the mock-fs CLI built next door under
# `tests/mock-fs/target/release/mock-fs.exe`. The path is resolved by
# the runner relative to this file's parent directory (consumer_root),
# so `../target/release/mock-fs.exe` reaches the cargo target dir.
#
# The .github/workflows/ci.yml `mock-scenario` job sets
# HARNESS_CONSUMER_ROOT and HARNESS_IMAGE_DIR before invoking
# run-matrix; do not rely on those defaults locally without setting
# them yourself.

[project]
name        = "mock-fs-self-test"
binary      = "../target/release/mock-fs.exe"
matrix_path = "test-matrix.json"

[vm]
# image_dir is resolved relative to the consumer_root (this file's
# parent) when HARNESS_IMAGE_DIR is not set in env. The fixture lives
# right here, so "." is correct.
image_dir = "."

[ops]
# v1 op-templates: bare strings, implicit host=vm. Used by the
# `mock-list` / `mock-cat-roundtrip` scenarios.
ls   = "{binary} ls {image} {path}"
cat  = "{binary} cat {image} {path}"
stat = "{binary} stat {image} {path}"

# v2 op-defs: structured table form with explicit host. Used by the
# `v2-recipe-host-only` scenario, which exercises the dispatcher loop
# without needing a real VM (host-only — runs on the CI runner).
# Substitution surface: {scenario.image}, {step.path}, {binary}.
[ops.host-ls]
host = "host"
command = "{binary} ls {scenario.image} {step.path}"
expect_exit = 0

[ops.host-cat]
host = "host"
command = "{binary} cat {scenario.image} {step.path}"
expect_exit = 0

[mount]
# The mock binary's `mount` subcommand prints "mounted at <drive>" and
# then blocks on stdin. The harness's run-scenario.ps1 uses ready_line
# as a regex against mount stdout to declare the mount up.
command    = "{binary} mount {image} --drive {drive} {extra}"
ready_line = "mounted at"
default_extra = ""
rw_extra      = "--rw"
