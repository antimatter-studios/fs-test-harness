# examples/minimal/harness.toml — the smallest plausible consumer config.
#
# Replace the placeholders before pointing the harness at this directory.
# The matrix in the same dir lists one scenario that exercises a fictional
# "myfs" driver; you will see the harness build the right command, attempt
# to run it, and emit a failure result because no real binary exists.

[project]
name        = "minimal-example"
binary      = "target/release/myfs.exe"      # fictional driver
matrix_path = "test-matrix.json"

[vm]
host    = "user@192.0.2.10"                  # replace
ssh_key = "../privatekey"                    # replace
workdir = "C:/Users/user/dev/minimal"

[tools]
# Optional reference tools. Substituted as {tools.fsck} etc. into [ops]
# templates.
# fsck = "fsck.myfs -fn"

[ops]
# Op-name -> shell command template. Reserved tokens:
#   {binary}, {image}, {drive}, {path}, {from}, {to}, {content}, {extra},
#   {tools.<name>}, {scenario.<dotted.path>}, {step.<field>}, {x?}.
#
# Bare-string shorthand is sugar for {host = "vm", expect_exit = 0}.
ls   = "{binary} ls {image} {path}"
cat  = "{binary} cat {image} {path}"
stat = "{binary} stat {image} {path}"

# [post_verify]
# command     = "{tools.fsck} {image}"
# expect_exit = 0
